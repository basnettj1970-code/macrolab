<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Structures Explorer — Macro Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== SHARED THEME SYSTEM ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0F1729;
  --navy-mid: #1A2540;
  --navy-light: #243054;
  --teal: #2D6A4F;
  --teal-dim: rgba(45,106,79,0.18);
  --teal-glow: rgba(45,106,79,0.40);
  --badge-text: #74C69D;
  --amber: #F5A623;
  --coral: #FF6B6B;
  --white: #F0EDE8;
  --muted: rgba(240,237,232,0.55);
  --border: rgba(240,237,232,0.08);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
}

[data-theme="light"] {
  --navy: #FAF9F6;
  --navy-mid: #FFFFFF;
  --navy-light: #F0EEE8;
  --teal: #1B4332;
  --teal-dim: rgba(27,67,50,0.10);
  --teal-glow: rgba(27,67,50,0.25);
  --badge-text: #1B4332;
  --amber: #C77D11;
  --coral: #D8453F;
  --white: #1A1F2B;
  --muted: rgba(26,31,43,0.55);
  --border: rgba(26,31,43,0.10);
}

body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  min-height: 100vh;
  line-height: 1.5;
  transition: background 0.25s, color 0.25s;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: color-mix(in srgb, var(--navy) 92%, transparent);
  backdrop-filter: blur(12px);
  z-index: 100;
  gap: 1rem;
  flex-wrap: wrap;
}
.logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--white);
  text-decoration: none;
}
.logo-dot { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; display: inline-block; }

.site-nav { display: flex; gap: 4px; background: var(--navy-mid); padding: 4px; border-radius: 10px; border: 1px solid var(--border); flex-wrap: wrap; }
.nav-link {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 7px;
  text-decoration: none;
  color: var(--muted);
  transition: all 0.18s;
  white-space: nowrap;
}
.nav-link.active { background: var(--navy-light); color: var(--white); }
.nav-link:hover:not(.active) { color: var(--white); }

.header-right { display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--navy-mid);
  color: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.18s;
}
.theme-toggle:hover { border-color: var(--teal); }

.header-badge {
  font-size: 11px;
  font-weight: 500;
  background: var(--teal-dim);
  color: var(--badge-text, var(--teal));
  border: 1px solid color-mix(in srgb, var(--teal) 25%, transparent);
  border-radius: 20px;
  padding: 4px 12px;
  white-space: nowrap;
}

@media (max-width: 800px) {
  header { flex-direction: column; align-items: stretch; }
  .site-nav { justify-content: center; }
}

.main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

.intro { max-width: 700px; }
.intro h1 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.intro p { color: var(--muted); font-size: 14px; line-height: 1.6; }

.structure-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.s-tab {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--navy-mid);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.s-tab.active { border-color: var(--s-color); color: var(--s-color); background: color-mix(in srgb, var(--s-color) 12%, transparent); }
.s-tab:hover:not(.active) { color: var(--white); }

.detail-card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-left: 3px solid var(--s-color);
  border-radius: 16px;
  padding: 2rem;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 2rem;
}
.detail-left h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--s-color); }
.detail-left .tagline { color: var(--muted); font-size: 13px; margin-bottom: 1.25rem; }
.example-chip { display: inline-block; font-size: 11px; font-weight: 500; background: var(--navy-light); color: var(--muted); padding: 4px 12px; border-radius: 20px; margin: 0 6px 6px 0; }
.feature-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 10px; }
.feature-row { display: flex; gap: 10px; font-size: 13px; line-height: 1.6; }
.feature-icon { color: var(--s-color); flex-shrink: 0; }
.feature-text { color: var(--muted); }
.feature-text b { color: var(--white); font-weight: 600; }

.stat-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
.stat-mini { background: var(--navy); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-mini-bar { height: 6px; background: var(--navy-light); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.stat-mini-fill { height: 100%; background: var(--s-color); border-radius: 4px; transition: width 0.3s; }
.stat-mini-value { font-family: var(--font-display); font-size: 13px; font-weight: 600; }

.compare-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.compare-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
.compare-card-title { font-family: var(--font-display); font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.compare-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-top: 1px solid var(--border); color: var(--muted); }
.compare-row:first-of-type { border-top: none; }
.compare-row span:last-child { color: var(--white); font-weight: 500; }

@media (max-width: 800px) {
  .detail-card { grid-template-columns: 1fr; }
  .compare-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<main class="main">
  <div class="intro">
    <h1>Market structures explorer</h1>
    <p>Compare how the number of sellers in a market changes pricing power, profit, and efficiency. Click a structure below to see its features in detail.</p>
  </div>

  <div class="structure-tabs" id="tabs"></div>

  <div class="detail-card" id="detail-card" style="--s-color:#2D6A4F;"></div>

  <div>
    <p class="sidebar-section-title" style="font-family:var(--font-display); font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:0.85rem;">Quick comparison</p>
    <div class="compare-grid" id="compare-grid"></div>
  </div>
</main>

<script>
const structures = {
  perfect: {
    color: '#2D6A4F',
    name: 'Perfect competition',
    tagline: 'Many small sellers, identical products, no single seller can influence price.',
    examples: ['Wheat farming', 'Foreign exchange', 'Fresh produce markets'],
    features: [
      ['Number of sellers', 'Very many — no single firm matters'],
      ['Product type', 'Identical (homogeneous)'],
      ['Pricing power', 'None — firms are "price takers"'],
      ['Barriers to entry', 'Very low — anyone can join'],
      ['Long-run profit', 'Zero economic profit — competition erodes it away']
    ],
    stats: { power: 5, barriers: 5, efficiency: 95, profit: 15 }
  },
  monopolistic: {
    color: '#F5A623',
    name: 'Monopolistic competition',
    tagline: 'Many sellers, but each offers a slightly different product — branding matters.',
    examples: ['Restaurants', 'Clothing brands', 'Hairdressers'],
    features: [
      ['Number of sellers', 'Many, but each has a niche'],
      ['Product type', 'Differentiated — branding, quality, location'],
      ['Pricing power', 'Some — based on brand loyalty'],
      ['Barriers to entry', 'Low to moderate'],
      ['Long-run profit', 'Small profit, kept low by new entrants copying success']
    ],
    stats: { power: 30, barriers: 30, efficiency: 70, profit: 35 }
  },
  oligopoly: {
    color: '#9D7BFF',
    name: 'Oligopoly',
    tagline: 'A handful of large firms dominate, and each watches the others closely.',
    examples: ['Supermarkets', 'Airlines', 'Mobile network providers'],
    features: [
      ['Number of sellers', 'Few — a small handful of large firms'],
      ['Product type', 'Can be similar or differentiated'],
      ['Pricing power', 'Significant — firms react to rivals\' moves'],
      ['Barriers to entry', 'High — large capital costs to compete'],
      ['Long-run profit', 'Can be substantial, especially if firms avoid price wars']
    ],
    stats: { power: 70, barriers: 75, efficiency: 50, profit: 65 }
  },
  monopoly: {
    color: '#FF6B6B',
    name: 'Monopoly',
    tagline: 'A single seller controls the entire market with no close substitutes.',
    examples: ['Local water utility', 'Patent-protected drugs', 'Rail network operator'],
    features: [
      ['Number of sellers', 'One — the sole supplier'],
      ['Product type', 'Unique, no close substitute'],
      ['Pricing power', 'Very high — firm is a "price maker"'],
      ['Barriers to entry', 'Very high — legal, technical, or cost barriers'],
      ['Long-run profit', 'Can be very high and persist over time']
    ],
    stats: { power: 95, barriers: 95, efficiency: 25, profit: 90 }
  }
};

let current = 'perfect';

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = Object.entries(structures).map(([key, s]) =>
    `<button class="s-tab ${key === current ? 'active' : ''}" style="--s-color:${s.color}" onclick="selectStructure('${key}')">${s.name}</button>`
  ).join('');
}

function selectStructure(key) {
  current = key;
  renderTabs();
  renderDetail();
}

function renderDetail() {
  const s = structures[current];
  const card = document.getElementById('detail-card');
  card.style.setProperty('--s-color', s.color);
  card.innerHTML = `
    <div class="detail-left">
      <h2>${s.name}</h2>
      <p class="tagline">${s.tagline}</p>
      <div>${s.examples.map(e => `<span class="example-chip">${e}</span>`).join('')}</div>
      <div class="feature-list">
        ${s.features.map(([label, val]) => `
          <div class="feature-row">
            <span class="feature-icon">●</span>
            <span class="feature-text"><b>${label}:</b> ${val}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="stat-mini-grid">
      <div class="stat-mini">
        <div class="stat-mini-label">Pricing power</div>
        <div class="stat-mini-value">${s.stats.power}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.power}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Entry barriers</div>
        <div class="stat-mini-value">${s.stats.barriers}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.barriers}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Market efficiency</div>
        <div class="stat-mini-value">${s.stats.efficiency}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.efficiency}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Long-run profit potential</div>
        <div class="stat-mini-value">${s.stats.profit}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.profit}%"></div></div>
      </div>
    </div>
  `;
}

function renderCompareGrid() {
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = Object.entries(structures).map(([key, s]) => `
    <div class="compare-card" style="border-top: 3px solid ${s.color};">
      <div class="compare-card-title" style="color:${s.color}">${s.name}</div>
      <div class="compare-row"><span>Sellers</span><span>${s.features[0][1].split(' —')[0]}</span></div>
      <div class="compare-row"><span>Pricing power</span><span>${s.stats.power}%</span></div>
      <div class="compare-row"><span>Entry barriers</span><span>${s.stats.barriers}%</span></div>
      <div class="compare-row"><span>Efficiency</span><span>${s.stats.efficiency}%</span></div>
    </div>
  `).join('');
}

renderTabs();
renderDetail();
renderCompareGrid();
</script>
<script>
// Theme toggle — persists per-tab in memory (no localStorage per artifact rules,
// but standalone files on GitHub Pages CAN use localStorage safely)
function initTheme() {
  const saved = localStorage.getItem('macrolab-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateToggleIcon(saved);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('macrolab-theme', next);
  updateToggleIcon(next);
  window.dispatchEvent(new CustomEvent('themechange', { detail: next }));
}
function updateToggleIcon(theme) {
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
initTheme();

</script>
</body>
</html>
